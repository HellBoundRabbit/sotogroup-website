    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
        import { getFirestore, collection, getDocs, query, where, deleteDoc, doc, getDoc, getDocFromServer, updateDoc } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';
        import { getAuth, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';
        import { getFunctions, httpsCallable } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-functions.js';
        import { getStorage, ref, deleteObject, getDownloadURL } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js';
        
        const firebaseConfig = {
            apiKey: "AIzaSyCkXzYFC1jQcA6yw6qY1Ao3luEYU4Rd0yA",
            authDomain: "soto-routes.firebaseapp.com",
            projectId: "soto-routes",
            storageBucket: "soto-routes.firebasestorage.app",
            messagingSenderId: "440989695549",
            appId: "1:440989695549:web:0bce8b92a46f7f79953454",
            measurementId: "G-4E3G40QQ9L"
        };
        
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const functions = getFunctions(app);
        const storage = getStorage(app);
        
        window.firebaseApp = app;
        window.db = db;
        window.auth = auth;
        window.functions = functions;
        window.storage = storage;
        window.ref = ref;
        window.deleteObject = deleteObject;
        window.getDownloadURL = getDownloadURL;
        window.firebase = {
            functions,
            httpsCallable
        };
        window.query = query;
        window.collection = collection;
        window.getDocs = getDocs;
        window.where = where;
        window.deleteDoc = deleteDoc;
        window.doc = doc;
        window.getDoc = getDoc;
        window.getDocFromServer = getDocFromServer;
        window.updateDoc = updateDoc;
        
        initializePaidExpensesApp();
    </script>

    <script>
        let currentSession = null;
        let currentUser = null;
        const notifyError = (message, title = 'Error') => uiDialogs.showAlert({ title, message, tone: 'danger' });
        const notifyWarning = (message, title = 'Heads Up') => uiDialogs.showAlert({ title, message, tone: 'warning' });
        const notifySuccess = (message, title = 'Success') => uiDialogs.showAlert({ title, message, tone: 'success' });
        const notifyInfo = (message, title = 'Notice') => uiDialogs.showAlert({ title, message, tone: 'info' });
        let allPaidBatches = [];
        let visibleBatchCount = 5;
        const getCurrentOfficeId = () => currentUser?.officeId || currentSession?.officeId || null;

        async function refreshPaidExpensePhotoDownloadUrl(photoURL) {
            if (!window.storage || typeof window.ref !== 'function' || typeof window.getDownloadURL !== 'function') return null;
            const path = (typeof EXPENSE_BATCH_SCHEMA !== 'undefined' && EXPENSE_BATCH_SCHEMA.extractStoragePathFromDownloadURL)
                ? EXPENSE_BATCH_SCHEMA.extractStoragePathFromDownloadURL(photoURL)
                : null;
            if (!path) return null;
            try {
                return await window.getDownloadURL(window.ref(window.storage, path));
            } catch (e) {
                return null;
            }
        }

        // Console diagnostics (filter DevTools console: DriverPaidExpenses) — view = <img> load; download = fetchPhotoBlob
        var PAID_PORTAL_PHOTO_LOG = '[DriverPaidExpenses:Photos]';
        function summarizePhotoUrlForLogPortal(url) {
            try {
                const u = new URL(url);
                return {
                    host: u.host,
                    pathStart: u.pathname.slice(0, 80),
                    hasAltMedia: u.searchParams.has('alt'),
                    hasToken: u.search.indexOf('token=') >= 0
                };
            } catch (e) {
                return { parseError: true, length: url ? url.length : 0 };
            }
        }
        function paidPortalPhotoLog(phase, payload) {
            if (typeof console !== 'undefined' && console.log) console.log(PAID_PORTAL_PHOTO_LOG, phase, payload == null ? '' : payload);
        }
        function paidPortalPhotoLogWarn(phase, payload) {
            if (typeof console !== 'undefined' && console.warn) console.warn(PAID_PORTAL_PHOTO_LOG, phase, payload == null ? '' : payload);
        }

        // Check for unread messages
        async function checkForUnreadMessages() {
            try {
                if (!currentUser || !currentUser.officeId || !currentUser.uid) return false;
                
                const messagesQuery = window.query(
                    window.collection(window.db, 'messages'),
                    window.where('officeId', '==', currentUser.officeId),
                    window.where('published', '==', true)
                );
                const snapshot = await window.getDocs(messagesQuery);
                const messages = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                
                // Get read messages from localStorage
                let readMessages = JSON.parse(localStorage.getItem('driver_read_messages') || '[]');
                
                // Also get read messages from Firebase (for persistence across devices/sessions)
                try {
                    const userDocRef = window.doc(window.db, 'users', currentUser.uid);
                    const userDoc = await window.getDoc(userDocRef);
                    if (userDoc.exists()) {
                        const userData = userDoc.data();
                        const firebaseReadMessages = userData.readMessages || [];
                        // Merge Firebase read messages with localStorage (deduplicate)
                        readMessages = [...new Set([...readMessages, ...firebaseReadMessages])];
                        // Update localStorage with merged list
                        localStorage.setItem('driver_read_messages', JSON.stringify(readMessages));
                    }
                } catch (firebaseError) {
                    console.warn('Could not fetch read messages from Firebase, using localStorage only:', firebaseError);
                }
                
                const unreadMessages = messages.filter(msg => !readMessages.includes(msg.id));
                
                return unreadMessages.length > 0;
            } catch (error) {
                console.error('Error checking messages:', error);
                return false; // If check fails, allow access
            }
        }

        function initializePaidExpensesApp() {
            (async () => {
                try {
                    const session = await window.sotoSession.bootstrap(['driver']);
                    if (!session) {
                    window.location.href = '/pages/soto-routes-login.html';
                    return;
                }

                    currentSession = session;
                    currentUser = { uid: session.uid, ...session };

                try {
                        const userDoc = await window.getDoc(window.doc(window.db, 'users', session.uid));
                    if (!userDoc.exists()) {
                        window.location.href = '/pages/soto-routes-login.html';
                        return;
                        }
                        currentUser = { ...currentUser, ...userDoc.data() };
                    } catch (profileError) {
                        console.warn('Unable to load driver profile for paid expenses:', profileError);
                    }
                    
                    if (currentUser.role !== 'driver') {
                        notifyWarning('Access denied.', 'Access Denied');
                        window.location.href = '/pages/dashboard.html';
                        return;
                    }

                    const hasUnreadMessages = await checkForUnreadMessages();
                    if (hasUnreadMessages) {
                        notifyInfo('There are outstanding messages that need to be read before proceeding. Please read all messages first.', 'Unread Messages');
                        window.location.href = '/pages/driver-messages.html';
                        return;
                    }

                    await loadPaidExpenses();
                    document.getElementById('loadingOverlay').style.display = 'none';
                } catch (error) {
                    console.error('Error initializing paid expenses:', error);
                    notifyError('Error loading user data.');
                    window.location.href = '/pages/soto-routes-login.html';
                }
            })();
        }

        async function loadPaidExpenses() {
            try {
                const officeId = getCurrentOfficeId();
                if (!officeId) {
                    notifyWarning('Unable to determine office context.');
                    return;
                }
                // Load transferred expenses (not paid - those show at bottom of main page)
                const batchesQuery = window.query(
                    window.collection(window.db, 'expenseBatches'),
                    window.where('driverId', '==', currentUser.uid),
                    window.where('status', '==', 'transferred'),
                    window.where('officeId', '==', officeId)
                );

                const batchesSnapshot = await window.getDocs(batchesQuery);
                const batches = [];

                for (const doc of batchesSnapshot.docs) {
                    const batchData = { id: doc.id, ...doc.data() };
                    if (!batchData.officeId) {
                        try {
                            await window.updateDoc(window.doc(window.db, 'expenseBatches', doc.id), { officeId });
                            batchData.officeId = officeId;
                        } catch (error) {
                            console.warn(`Failed to backfill officeId for batch ${doc.id}:`, error);
                        }
                    }
                    if (!batchData.lines || typeof batchData.lines !== 'object') {
                        batchData.lines = (typeof EXPENSE_BATCH_SCHEMA !== 'undefined' && EXPENSE_BATCH_SCHEMA.emptyLines) ? EXPENSE_BATCH_SCHEMA.emptyLines() : {};
                    }
                    batches.push(batchData);
                }

                batches.sort((a, b) => {
                    const aTime = a.paidAt?.toDate ? a.paidAt.toDate().getTime() : a.submittedAt?.toDate ? a.submittedAt.toDate().getTime() : 0;
                    const bTime = b.paidAt?.toDate ? b.paidAt.toDate().getTime() : b.submittedAt?.toDate ? b.submittedAt.toDate().getTime() : 0;
                    return bTime - aTime;
                });

                allPaidBatches = batches;
                visibleBatchCount = 5;
                displayPaidExpenses(batches);
                
                // Start countdown timers and auto-delete check
                startCountdownTimers();
                checkAndDeleteExpiredExpenses();
            } catch (error) {
                console.error('Error loading paid expenses:', error);
                notifyError('Error loading paid expenses.');
            }
        }
        
        // Format countdown timer (hours only)
        function formatCountdown(deleteAt) {
            const now = new Date();
            const diff = deleteAt.getTime() - now.getTime();
            
            if (diff <= 0) {
                return '0';
            }
            
            const totalHours = Math.floor(diff / (1000 * 60 * 60));
            
            return `${totalHours}`;
        }
        
        // Start countdown timers for all displayed expenses
        function startCountdownTimers() {
            // Clear any existing intervals
            if (window.countdownInterval) {
                clearInterval(window.countdownInterval);
            }
            
            // Update timers every 30 seconds for better UX
            window.countdownInterval = setInterval(() => {
                const expensePanels = document.querySelectorAll('[data-batch-id][data-delete-at]');
                let hasExpired = false;
                
                expensePanels.forEach(panel => {
                    const deleteAtTimestamp = parseInt(panel.getAttribute('data-delete-at'));
                    if (!deleteAtTimestamp) return;
                    
                    const deleteAt = new Date(deleteAtTimestamp);
                    const countdownId = `countdown-${panel.getAttribute('data-batch-id')}`;
                    const countdownElement = document.getElementById(countdownId);
                    
                    if (countdownElement) {
                        const now = new Date();
                        if (now >= deleteAt) {
                            countdownElement.textContent = '0 hours until automatic deletion.';
                            hasExpired = true;
                        } else {
                            const remaining = formatCountdown(deleteAt);
                            countdownElement.textContent = `${remaining} hours until automatic deletion.`;
                        }
                    }
                });
                
                // Check and delete expired expenses if any are expired
                if (hasExpired) {
                    checkAndDeleteExpiredExpenses();
                }
            }, 30000); // Update every 30 seconds
        }
        
        // Check and delete expired expenses
        async function checkAndDeleteExpiredExpenses() {
            try {
                const now = new Date();
                const batchesToDelete = [];
                
                // Check all batches for expiration
                for (const batch of allPaidBatches) {
                    if (batch.deleteAt) {
                        const deleteAt = batch.deleteAt.toDate ? batch.deleteAt.toDate() : new Date(batch.deleteAt);
                        if (now >= deleteAt) {
                            batchesToDelete.push(batch);
                        }
                    }
                }
                
                // Delete expired batches and their photo files in Storage (7-day countdown)
                for (const batch of batchesToDelete) {
                    try {
                        // Delete all photo files for this batch from Storage, then delete the batch document
                        function extractStoragePathFromURL(downloadURL) {
                            try {
                                // Firebase Storage URLs format: https://firebasestorage.googleapis.com/v0/b/{bucket}/o/{encodedPath}?alt=media&token={token}
                                const url = new URL(downloadURL);
                                const pathMatch = url.pathname.match(/\/o\/(.+)/);
                                if (pathMatch) {
                                    // Decode the encoded path (URL encoding)
                                    return decodeURIComponent(pathMatch[1]);
                                }
                                return null;
                            } catch (error) {
                                console.warn('Failed to extract storage path from URL:', downloadURL, error);
                                return null;
                            }
                        }
                        
                        const photoDeletePromises = [];
                        for (const line of Object.values(batch.lines || {})) {
                            if (!line || !Array.isArray(line.photos)) continue;
                            for (const photoURL of line.photos) {
                                if (typeof photoURL === 'string' && photoURL.startsWith('http')) {
                                    try {
                                        const storagePath = extractStoragePathFromURL(photoURL);
                                        if (storagePath) {
                                            const photoRef = window.ref(window.storage, storagePath);
                                            photoDeletePromises.push(window.deleteObject(photoRef).catch(err => console.warn('Photo delete failed', err)));
                                        }
                                    } catch (e) { console.warn('URL parse failed', e); }
                                }
                            }
                        }
                        await Promise.allSettled(photoDeletePromises);
                        await window.deleteDoc(window.doc(window.db, 'expenseBatches', batch.id));
                        
                        console.log(`Auto-deleted expired batch: ${batch.registration}`);
                    } catch (error) {
                        console.error(`Error deleting expired batch ${batch.id}:`, error);
                    }
                }
                
                // Reload if any were deleted
                if (batchesToDelete.length > 0) {
                    await loadPaidExpenses();
                }
            } catch (error) {
                console.error('Error checking expired expenses:', error);
            }
        }

        function displayPaidExpenses(batches) {
            const container = document.getElementById('paidBatches');
            const emptyState = document.getElementById('emptyState');
            const loadMoreSection = document.getElementById('loadMoreSection');
            
            if (batches.length === 0) {
                container.classList.add('hidden');
                emptyState.classList.remove('hidden');
                if (loadMoreSection) {
                    loadMoreSection.classList.add('hidden');
                }
                return;
            }

            container.classList.remove('hidden');
            emptyState.classList.add('hidden');

            const batchesToRender = batches.slice(0, visibleBatchCount);
            container.innerHTML = batchesToRender.map(batch => {
                const paidDate = batch.paidAt?.toDate ? batch.paidAt.toDate() : new Date();
                const dateStr = paidDate.toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' });
                const timeStr = paidDate.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
                
                let totalPhotos = 0;
                if (batch.lines && typeof EXPENSE_BATCH_SCHEMA !== 'undefined') {
                    const used = (EXPENSE_BATCH_SCHEMA.getUsedLinesInOrder || EXPENSE_BATCH_SCHEMA.getUsedLines) ? (EXPENSE_BATCH_SCHEMA.getUsedLinesInOrder || EXPENSE_BATCH_SCHEMA.getUsedLines)(batch) : [];
                    totalPhotos = used.reduce((sum, k) => sum + ((batch.lines[k] && batch.lines[k].photos && batch.lines[k].photos.length) || 0), 0);
                } else {
                    totalPhotos = 0;
                    if (batch.lines && typeof batch.lines === 'object') {
                        for (const line of Object.values(batch.lines)) {
                            if (line && Array.isArray(line.photos)) totalPhotos += line.photos.filter(p => typeof p === 'string').length;
                        }
                    }
                }
                const itemCount = (typeof EXPENSE_BATCH_SCHEMA !== 'undefined' && EXPENSE_BATCH_SCHEMA.getUsedLineCount) ? EXPENSE_BATCH_SCHEMA.getUsedLineCount(batch) : 0;
                
                const transferredDate = batch.transferredAt?.toDate ? batch.transferredAt.toDate() : 
                                       (batch.paidAt?.toDate ? batch.paidAt.toDate() : new Date());
                const transferredDateStr = transferredDate.toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' });
                const transferredTimeStr = transferredDate.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
                
                // Calculate delete time
                const deleteAt = batch.deleteAt?.toDate ? batch.deleteAt.toDate() : 
                               (batch.transferredAt?.toDate ? (() => {
                                   const dt = batch.transferredAt.toDate();
                                   dt.setHours(dt.getHours() + 120);
                                   return dt;
                               })() : null);
                
                const countdownId = `countdown-${batch.id}`;
                
                return `
                    <div class="bg-[#1a1f24] rounded-lg p-4 border border-gray-800 fade-in" data-batch-id="${batch.id}" data-delete-at="${deleteAt ? deleteAt.getTime() : ''}">

        // Generate PDF for expense batch (matching app layout exactly)
        function generateExpensePDF(batch) {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            
            // Get dates
            const paymentDate = batch.paidAt?.toDate ? batch.paidAt.toDate() : 
                               (batch.submittedAt?.toDate ? batch.submittedAt.toDate() : new Date());
            const submissionDate = batch.submittedAt?.toDate ? batch.submittedAt.toDate() : new Date();
            const validationDate = batch.validatedAt?.toDate ? batch.validatedAt.toDate() : null;
            const processedDate = batch.processedAt?.toDate
                ? batch.processedAt.toDate()
                : (batch.processedAt instanceof Date
                    ? batch.processedAt
                    : (batch.processedAt ? new Date(batch.processedAt) : null));
            
            // Format dates (medium date style with short time)
            const formatDate = (date) => {
                if (!date) return 'Not set';
                const options = { 
                    year: 'numeric', 
                    month: 'long', 
                    day: 'numeric',
                    hour: '2-digit',
                    minute: '2-digit'
                };
                return date.toLocaleDateString('en-GB', options);
            };
            
            const ptToMm = 0.352778; // Conversion factor: 1pt = 0.352778mm
            let y = 32 * ptToMm; // Start at 32pt = 11.3mm (matching app)
            
            // Title - centered, 28pt bold
            doc.setFontSize(28);
            doc.setFont(undefined, 'bold');
            const titleWidth = doc.getTextWidth('Expense Report');
            doc.text('Expense Report', (210 - titleWidth) / 2, y);
            y += 24 * ptToMm; // 24pt = 8.5mm
            
            // Information section - 16pt medium weight
            doc.setFontSize(16);
            doc.setFont(undefined, 'normal');
            const infoStartX = 48 * ptToMm; // 48pt left margin = 17mm (matching app)
            doc.text(`Registration: ${batch.registration}`, infoStartX, y);
            y += 24 * ptToMm; // 24pt = 8.5mm
            doc.text(`Driver: ${batch.driverName || 'Unknown'}`, infoStartX, y);
            y += 24 * ptToMm;
            doc.text(`Submitted on: ${formatDate(submissionDate)}`, infoStartX, y);
            y += 24 * ptToMm;
            doc.text(`Validated on: ${validationDate ? formatDate(validationDate) : 'Not validated'}`, infoStartX, y);
            y += 24 * ptToMm;
            doc.text(`Paid on: ${paymentDate ? formatDate(paymentDate) : 'Not paid'}`, infoStartX, y);
            y += 24 * ptToMm;
            doc.text(`Processed on: ${processedDate ? formatDate(processedDate) : 'Not processed'}`, infoStartX, y);
            y += 28 * ptToMm; // 28pt = 9.9mm before table
            
            // Table setup (matching app dimensions)
            // App uses: pageWidth = 595.2pt (A4), left margin = 48pt, tableWidth = 595.2 - 96 = 499.2pt
            // Column 0 (Category) = 120pt, remaining 5 columns = (499.2 - 120) / 5 = 75.84pt each
            // Converting to mm (1pt = 0.352778mm): col0 = 42.33mm, colRest = 26.75mm each
            const tableStartY = y;
            const pageWidth = 210; // A4 width in mm
            const leftMargin = 48 * 0.352778; // 48pt in mm ≈ 17mm
            const tableWidth = pageWidth - (leftMargin * 2); // Total width minus margins
            const col0 = 42.33; // Category column in mm
            const colRest = (tableWidth - col0) / 5; // Remaining 5 columns equally divided
            
            // Category normalization map
            const categoryMap = {
                'fuel': 'Fuel',
                'charge': 'Charge',
                'train': 'Train',
                'train fare': 'Train',
                'bus': 'Bus',
                'taxi': 'Taxi',
                'car wash': 'Car Wash',
                'carwash': 'Car Wash',
                'toll': 'Tolls',
                'tolls': 'Tolls',
                'other': 'Other'
            };
            
            const categories = ['Fuel', 'Charge', 'Train', 'Bus', 'Taxi', 'Car Wash', 'Tolls', 'Other'];
            
            const expensesByCategory = {};
            if (batch.lines && typeof EXPENSE_BATCH_SCHEMA !== 'undefined' && (EXPENSE_BATCH_SCHEMA.getUsedLinesInOrder || EXPENSE_BATCH_SCHEMA.getUsedLines)) {
                const prefixToCat = { train: 'Train', taxi: 'Taxi', fuel: 'Fuel', charge: 'Charge', bus: 'Bus', carWash: 'Car Wash', toll: 'Tolls', other: 'Other' };
                ((EXPENSE_BATCH_SCHEMA.getUsedLinesInOrder || EXPENSE_BATCH_SCHEMA.getUsedLines)(batch) || []).forEach(lineKey => {
                    const line = batch.lines[lineKey];
                    if (!line || !EXPENSE_BATCH_SCHEMA.hasLineContent(line)) return;
                    const prefix = (EXPENSE_BATCH_SCHEMA.getCategoryGroup && EXPENSE_BATCH_SCHEMA.getCategoryGroup(lineKey)) || 'other';
                    const cat = prefixToCat[prefix] || 'Other';
                    if (!expensesByCategory[cat]) expensesByCategory[cat] = [];
                    expensesByCategory[cat].push({ amount: line.amount || 0, photos: line.photos || [] });
                });
            }

            // Create table data matching app format
            const tableData = [];
            const headers = ['', '1', '2', '3', '4', 'TOTAL'];
            
            // Add header row
            tableData.push(headers);
            
            // Add category rows
            categories.forEach(category => {
                const categoryExpenses = expensesByCategory[category] || [];
                const row = [category];
                
                // Add up to 4 individual expenses
                for (let i = 0; i < 4; i++) {
                    if (i < categoryExpenses.length) {
                        row.push(`£${parseFloat(categoryExpenses[i].amount || 0).toFixed(2)}`);
                    } else {
                        row.push('');
                    }
                }
                
                // Calculate category total
                const categoryTotal = categoryExpenses.reduce((sum, exp) => sum + parseFloat(exp.amount || 0), 0);
                row.push(categoryTotal > 0 ? `£${categoryTotal.toFixed(2)}` : '');
                
                tableData.push(row);
            });
            
            // Add total row
            const totalRow = ['TOTAL', '', '', '', '', `£${batch.totalAmount?.toFixed(2) || '0.00'}`];
            tableData.push(totalRow);
            
            // Draw table using autoTable with custom styling to match app
            doc.autoTable({
                startY: tableStartY,
                head: [tableData[0]],
                body: tableData.slice(1),
                headStyles: { 
                    fillColor: [217, 217, 217], // Gray background (0.85 white)
                    textColor: 0,
                    fontStyle: 'bold',
                    fontSize: 15
                },
                bodyStyles: {
                    fontSize: 15,
                    textColor: 0
                },
                alternateRowStyles: {
                    fillColor: [245, 245, 245] // Very light gray (0.96 white)
                },
                columnStyles: {
                    0: { cellWidth: col0, fontStyle: 'bold' },
                    1: { cellWidth: colRest, halign: 'left' },
                    2: { cellWidth: colRest, halign: 'left' },
                    3: { cellWidth: colRest, halign: 'left' },
                    4: { cellWidth: colRest, halign: 'left' },
                    5: { cellWidth: colRest, halign: 'left', fontStyle: 'bold' }
                },
                styles: {
                    lineWidth: 1,
                    lineColor: 0
                },
                margin: { left: infoStartX }
            });
            
            y = doc.lastAutoTable.finalY + 40;
            
            // Generate expense summary lines (matching app format)
            const primaryCategories = ['Fuel', 'Charge', 'Car Wash'];
            const secondaryCategories = ['Bus', 'Train', 'Taxi', 'Tolls', 'Other'];
            
            // Primary line (bold)
            const primaryAmounts = [];
            primaryCategories.forEach(cat => {
                const exp = expensesByCategory[cat] || [];
                if (exp.length > 0) {
                    const amounts = exp.map(e => `£${parseFloat(e.amount || 0).toFixed(2)}`).join(' + ');
                    primaryAmounts.push(`${cat}:(${amounts})`);
                }
            });
            
            if (primaryAmounts.length > 0) {
                doc.setFontSize(13);
                doc.setFont(undefined, 'bold');
                doc.text(primaryAmounts.join('  '), infoStartX, y);
                y += 24 * ptToMm;
            }
            
            // Secondary line (regular)
            const secondaryAmounts = [];
            secondaryCategories.forEach(cat => {
                const exp = expensesByCategory[cat] || [];
                if (exp.length > 0) {
                    const amounts = exp.map(e => `£${parseFloat(e.amount || 0).toFixed(2)}`).join(' + ');
                    secondaryAmounts.push(`${cat}: (${amounts})`);
                }
            });
            
            if (secondaryAmounts.length > 0) {
                doc.setFontSize(14);
                doc.setFont(undefined, 'normal');
                doc.text(secondaryAmounts.join(' '), infoStartX, y);
                y += 24 * ptToMm;
            }
            
            // Total line (bold)
            doc.setFontSize(16);
            doc.setFont(undefined, 'bold');
            doc.text(`Total: £${batch.totalAmount?.toFixed(2) || '0.00'}`, infoStartX, y);
            y += 32 * ptToMm;
            
            // Footer text
            doc.setFontSize(13);
            doc.setFont(undefined, 'italic');
            doc.setTextColor(105, 105, 105); // darkGray
            const footerText = 'This report is for client records. Please retain for your files.\n\nIf you have any questions, contact SOTO support.';
            doc.text(footerText, infoStartX, y, { maxWidth: 210 - (infoStartX * 2), align: 'left' });
            
            // Bottom footer
            doc.setFontSize(12);
            doc.setTextColor(128, 128, 128); // gray
            doc.text('Expense report generated by - SOTORoutes', 
                    105, 280, { align: 'center' });
            
            return doc;
        }

        // View PDF in new window
        function viewExpensePDF(batchId) {
            const batch = allPaidBatches.find(b => b.id === batchId);
            if (!batch) {
                notifyError('Batch not found.', 'Missing Batch');
                return;
            }

            try {
                const doc = generateExpensePDF(batch);
                const pdfBlob = doc.output('blob');
                const url = URL.createObjectURL(pdfBlob);
                window.open(url, '_blank');
                // Clean up the URL after a delay
                setTimeout(() => URL.revokeObjectURL(url), 100);
            } catch (error) {
                console.error('Error generating PDF:', error);
                notifyError('Error generating PDF: ' + error.message);
            }
        }

        // Download PDF and Photos with folder structure
        async function downloadExpensePDFAndPhotos(batchId) {
            let batch = allPaidBatches.find(b => b.id === batchId);
            if (!batch) {
                notifyError('Batch not found.', 'Missing Batch');
                return;
            }

            // Check if File System Access API is supported
            if (!('showDirectoryPicker' in window)) {
                // Fallback: Download as ZIP
                const useDownloads = await showConfirmation({
                    title: 'Download ZIP Instead?',
                    message: 'Your browser does not support selecting folders.\n\nWould you like to download a ZIP file to your Downloads folder instead?\n\n(For folder selection, please use Chrome or Edge)',
                    confirmText: 'Download ZIP',
                    cancelText: 'Cancel',
                    tone: 'info'
                });
                
                if (useDownloads) {
                    await downloadExpenseAsZIP(batch);
                }
                return;
            }

            try {
                paidPortalPhotoLog('download-folder:open', { batchId: batchId, registration: batch.registration });
                // Ask user to select a folder
                const directoryHandle = await window.showDirectoryPicker({
                    mode: 'readwrite'
                });
                
                // Get current date for folder structure
                const today = new Date();
                const year = today.getFullYear();
                const month = String(today.getMonth() + 1).padStart(2, '0');
                const day = String(today.getDate()).padStart(2, '0');
                const dateFolderName = `${day}_${month}_${year}`;
                
                // Clean registration
                const cleanedReg = batch.registration.replace(/[\/\\:]/g, '-').replace(/\s+/g, '_');
                
                // Create folder structure: dateFolderName/cleanedReg/
                let currentHandle = directoryHandle;
                currentHandle = await getOrCreateFolder(currentHandle, dateFolderName);
                currentHandle = await getOrCreateFolder(currentHandle, cleanedReg);
                
                // Generate and save PDF
                const doc = generateExpensePDF(batch);
                const pdfBlob = doc.output('blob');
                const driverNameForFile = (batch.driverName || 'Unknown_Driver').replace(/_/g, ' ');
                const pdfFileName = `${cleanedReg}_${driverNameForFile}.pdf`;
                const pdfFileHandle = await currentHandle.getFileHandle(pdfFileName, { create: true });
                const pdfWritable = await pdfFileHandle.createWritable();
                await pdfWritable.write(pdfBlob);
                await pdfWritable.close();

                try {
                    const batchRef = window.doc(window.db, 'expenseBatches', batchId);
                    const snap = (typeof window.getDocFromServer === 'function')
                        ? await window.getDocFromServer(batchRef)
                        : await window.getDoc(batchRef);
                    if (snap && snap.exists()) {
                        batch = { id: snap.id, ...snap.data() };
                        const li = allPaidBatches.findIndex(b => b.id === batchId);
                        if (li >= 0) allPaidBatches[li] = batch;
                        paidPortalPhotoLog('download-folder:refetched-batch-before-photos', { batchId: batchId, registration: batch.registration });
                    }
                } catch (refErr) {
                    paidPortalPhotoLogWarn('download-folder:refetch-before-photos-failed', { message: refErr && refErr.message });
                }
                
                const usedLineKeys = (typeof EXPENSE_BATCH_SCHEMA !== 'undefined' && (EXPENSE_BATCH_SCHEMA.getUsedLinesInOrder || EXPENSE_BATCH_SCHEMA.getUsedLines)) ? (EXPENSE_BATCH_SCHEMA.getUsedLinesInOrder || EXPENSE_BATCH_SCHEMA.getUsedLines)(batch) : [];
                const getLineLabelPaid = (typeof EXPENSE_BATCH_SCHEMA !== 'undefined' && EXPENSE_BATCH_SCHEMA.getCategoryLabel) ? EXPENSE_BATCH_SCHEMA.getCategoryLabel.bind(null) : function (k) { return k; };
                let photoIndex = 1;
                let folderFetchOk = 0;
                const photoFailures = [];
                for (const lineKey of usedLineKeys) {
                    const line = (batch.lines || {})[lineKey];
                    if (!line || !Array.isArray(line.photos)) continue;
                    const lineLabelPaid = getLineLabelPaid(lineKey);
                    for (const photoURL of line.photos) {
                        if (typeof photoURL !== 'string') continue;
                        paidPortalPhotoLog('download-folder:fetchPhotoBlob-start', {
                            slot: photoIndex,
                            lineKey: lineKey,
                            lineLabel: lineLabelPaid,
                            urlSummary: summarizePhotoUrlForLogPortal(photoURL)
                        });
                        const result = await (EXPENSE_BATCH_SCHEMA && EXPENSE_BATCH_SCHEMA.fetchPhotoBlob ? EXPENSE_BATCH_SCHEMA.fetchPhotoBlob : fetchPhotoBlob)(photoURL, 2, refreshPaidExpensePhotoDownloadUrl);
                        if (result.error) {
                            paidPortalPhotoLogWarn('download-folder:fetchPhotoBlob-fail', {
                                slot: photoIndex,
                                lineKey: lineKey,
                                reason: result.error.reason,
                                status: result.error.status,
                                urlSummary: summarizePhotoUrlForLogPortal(photoURL)
                            });
                            photoFailures.push(Object.assign({}, result.error, { lineKey: lineKey, lineLabel: lineLabelPaid }));
                            continue;
                        }
                        paidPortalPhotoLog('download-folder:fetchPhotoBlob-ok', { slot: photoIndex, ext: result.ext, bytes: result.blob && result.blob.size });
                        try {
                            const photoFileName = `photo_${photoIndex}${result.ext || '.jpg'}`;
                            const photoFileHandle = await currentHandle.getFileHandle(photoFileName, { create: true });
                            const photoWritable = await photoFileHandle.createWritable();
                            await photoWritable.write(result.blob);
                            await photoWritable.close();
                            folderFetchOk++;
                            photoIndex++;
                        } catch (error) {
                            paidPortalPhotoLogWarn('download-folder:disk-write-fail', { slot: photoIndex, message: error && error.message });
                            photoFailures.push({ url: photoURL, reason: (error && error.message) || String(error), lineKey: lineKey, lineLabel: lineLabelPaid });
                        }
                    }
                }
                paidPortalPhotoLog('download-folder:photos-summary', { okCount: folderFetchOk, failCount: photoFailures.length, registration: batch.registration });
                notifySuccess(`Successfully saved PDF and photos to ${dateFolderName}/${cleanedReg}/`, 'Files Saved');
                if (photoFailures.length > 0) {
                    try {
                        const reportName = (EXPENSE_BATCH_SCHEMA && EXPENSE_BATCH_SCHEMA.PHOTO_TRANSFER_FAILURE_FILENAME) ? EXPENSE_BATCH_SCHEMA.PHOTO_TRANSFER_FAILURE_FILENAME : 'PHOTOS_NOT_DOWNLOADED.txt';
                        const reportBody = (EXPENSE_BATCH_SCHEMA && EXPENSE_BATCH_SCHEMA.buildPhotoFailureFolderReport) ? EXPENSE_BATCH_SCHEMA.buildPhotoFailureFolderReport(photoFailures, batch.registration) : '';
                        if (reportBody) {
                            const reportFileHandle = await currentHandle.getFileHandle(reportName, { create: true });
                            const reportWritable = await reportFileHandle.createWritable();
                            await reportWritable.write(new Blob([reportBody], { type: 'text/plain;charset=utf-8' }));
                            await reportWritable.close();
                        }
                    } catch (reportErr) {
                        console.warn('Could not write photo failure report file', reportErr);
                    }
                    const reportNameShort = (EXPENSE_BATCH_SCHEMA && EXPENSE_BATCH_SCHEMA.PHOTO_TRANSFER_FAILURE_FILENAME) ? EXPENSE_BATCH_SCHEMA.PHOTO_TRANSFER_FAILURE_FILENAME : 'PHOTOS_NOT_DOWNLOADED.txt';
                    const msg = photoFailures.length + ' photo(s) could not be downloaded for batch ' + batch.registration + '.\n\n' + reportNameShort + ' was saved in this folder listing what is missing.\n\nYou can copy details for support.';
                    const copied = await (window.uiDialogs && window.uiDialogs.showConfirmation ? window.uiDialogs.showConfirmation({ title: 'Some Photos Failed', message: msg, confirmText: 'Copy details', cancelText: 'Close', tone: 'warning' }) : Promise.resolve(false));
                    if (copied && EXPENSE_BATCH_SCHEMA && EXPENSE_BATCH_SCHEMA.buildPhotoFailureFolderReport) {
                        const debugText = EXPENSE_BATCH_SCHEMA.buildPhotoFailureFolderReport(photoFailures, batch.registration);
                        await navigator.clipboard.writeText(debugText);
                        if (window.uiDialogs && window.uiDialogs.showToast) window.uiDialogs.showToast({ title: 'Copied', message: 'Details copied.', tone: 'success' });
                    }
                }
            } catch (error) {
                if (error.name === 'AbortError' || error.message?.includes('canceled')) {
                    // User cancelled folder selection - offer ZIP fallback
                    const useDownloads = await showConfirmation({
                        title: 'Download ZIP Instead?',
                        message: 'Folder selection cancelled.\n\nWould you like to download a ZIP file to your Downloads folder instead?',
                        confirmText: 'Download ZIP',
                        cancelText: 'Cancel',
                        tone: 'warning'
                    });
                    if (useDownloads) {
                        await downloadExpenseAsZIP(batch);
                    }
                    return;
                }
                paidPortalPhotoLogWarn('download-folder:error', { batchId: batchId, message: error && error.message });
                console.error('Error downloading expense:', error);
                notifyError('Error downloading expense: ' + error.message);
            }
        }

        // Download expense as ZIP (fallback)
        async function downloadExpenseAsZIP(batchParam) {
            let batch = batchParam;
            try {
                paidPortalPhotoLog('download-zip:start', { batchId: batch.id, registration: batch.registration });
                try {
                    const batchRef = window.doc(window.db, 'expenseBatches', batch.id);
                    const snap = (typeof window.getDocFromServer === 'function')
                        ? await window.getDocFromServer(batchRef)
                        : await window.getDoc(batchRef);
                    if (snap && snap.exists()) {
                        batch = { id: snap.id, ...snap.data() };
                        const li = allPaidBatches.findIndex(b => b.id === batch.id);
                        if (li >= 0) allPaidBatches[li] = batch;
                        paidPortalPhotoLog('download-zip:refetched-batch', { batchId: batch.id, registration: batch.registration });
                    }
                } catch (zRefErr) {
                    paidPortalPhotoLogWarn('download-zip:refetch-failed', { message: zRefErr && zRefErr.message });
                }
                const zip = new JSZip();
                
                // Get current date for folder structure
                const today = new Date();
                const year = today.getFullYear();
                const month = String(today.getMonth() + 1).padStart(2, '0');
                const day = String(today.getDate()).padStart(2, '0');
                const dateFolderName = `${day}_${month}_${year}`;
                
                // Clean registration
                const cleanedReg = batch.registration.replace(/[\/\\:]/g, '-').replace(/\s+/g, '_');
                
                // Folder path: dateFolderName/cleanedReg/
                const folderPath = `${dateFolderName}/${cleanedReg}/`;
                
                // Generate PDF
                const doc = generateExpensePDF(batch);
                const pdfBlob = doc.output('blob');
                const driverNameForFile = (batch.driverName || 'Unknown_Driver').replace(/_/g, ' ');
                const pdfFileName = `${cleanedReg}_${driverNameForFile}.pdf`;
                zip.file(folderPath + pdfFileName, pdfBlob);
                
                const usedLineKeys = (typeof EXPENSE_BATCH_SCHEMA !== 'undefined' && (EXPENSE_BATCH_SCHEMA.getUsedLinesInOrder || EXPENSE_BATCH_SCHEMA.getUsedLines)) ? (EXPENSE_BATCH_SCHEMA.getUsedLinesInOrder || EXPENSE_BATCH_SCHEMA.getUsedLines)(batch) : [];
                const getLineLabelZipPaid = (typeof EXPENSE_BATCH_SCHEMA !== 'undefined' && EXPENSE_BATCH_SCHEMA.getCategoryLabel) ? EXPENSE_BATCH_SCHEMA.getCategoryLabel.bind(null) : function (k) { return k; };
                let photoIndex = 1;
                let zipFetchOk = 0;
                const photoFailures = [];
                for (const lineKey of usedLineKeys) {
                    const line = (batch.lines || {})[lineKey];
                    if (!line || !Array.isArray(line.photos)) continue;
                    const lineLabelZipPaid = getLineLabelZipPaid(lineKey);
                    for (const photoURL of line.photos) {
                        if (typeof photoURL !== 'string') continue;
                        paidPortalPhotoLog('download-zip:fetchPhotoBlob-start', {
                            zipSlot: photoIndex,
                            lineKey: lineKey,
                            lineLabel: lineLabelZipPaid,
                            urlSummary: summarizePhotoUrlForLogPortal(photoURL)
                        });
                        const result = await (EXPENSE_BATCH_SCHEMA && EXPENSE_BATCH_SCHEMA.fetchPhotoBlob ? EXPENSE_BATCH_SCHEMA.fetchPhotoBlob : fetchPhotoBlob)(photoURL, 2, refreshPaidExpensePhotoDownloadUrl);
                        if (result.error) {
                            paidPortalPhotoLogWarn('download-zip:fetchPhotoBlob-fail', {
                                zipSlot: photoIndex,
                                lineKey: lineKey,
                                reason: result.error.reason,
                                status: result.error.status,
                                urlSummary: summarizePhotoUrlForLogPortal(photoURL)
                            });
                            photoFailures.push(Object.assign({}, result.error, { lineKey: lineKey, lineLabel: lineLabelZipPaid }));
                            continue;
                        }
                        paidPortalPhotoLog('download-zip:fetchPhotoBlob-ok', { zipSlot: photoIndex, ext: result.ext, bytes: result.blob && result.blob.size });
                        zip.file(folderPath + `photo_${photoIndex}${result.ext || '.jpg'}`, result.blob);
                        zipFetchOk++;
                        photoIndex++;
                    }
                }
                paidPortalPhotoLog('download-zip:photos-summary', { okCount: zipFetchOk, failCount: photoFailures.length, registration: batch.registration });
                if (photoFailures.length > 0 && EXPENSE_BATCH_SCHEMA && EXPENSE_BATCH_SCHEMA.buildPhotoFailureFolderReport) {
                    const zName = EXPENSE_BATCH_SCHEMA.PHOTO_TRANSFER_FAILURE_FILENAME || 'PHOTOS_NOT_DOWNLOADED.txt';
                    zip.file(folderPath + zName, EXPENSE_BATCH_SCHEMA.buildPhotoFailureFolderReport(photoFailures, batch.registration));
                }
                
                // Generate and download ZIP
                const zipBlob = await zip.generateAsync({ type: 'blob' });
                const url = URL.createObjectURL(zipBlob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `${cleanedReg}_${dateFolderName}.zip`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
                
                notifySuccess('Successfully downloaded PDF and photos as ZIP file!', 'ZIP Downloaded');
                paidPortalPhotoLog('download-zip:complete', { fileName: `${cleanedReg}_${dateFolderName}.zip`, okCount: zipFetchOk, failCount: photoFailures.length });
                if (photoFailures.length > 0) {
                    const fn = (EXPENSE_BATCH_SCHEMA && EXPENSE_BATCH_SCHEMA.PHOTO_TRANSFER_FAILURE_FILENAME) ? EXPENSE_BATCH_SCHEMA.PHOTO_TRANSFER_FAILURE_FILENAME : 'PHOTOS_NOT_DOWNLOADED.txt';
                    const msg = photoFailures.length + ' photo(s) could not be downloaded.\n\nThe ZIP includes ' + fn + ' with the list of failures.\n\nYou can copy details here for support.';
                    const copied = await (window.uiDialogs && window.uiDialogs.showConfirmation ? window.uiDialogs.showConfirmation({ title: 'Some Photos Failed', message: msg, confirmText: 'Copy details', cancelText: 'Close', tone: 'warning' }) : Promise.resolve(false));
                    if (copied && EXPENSE_BATCH_SCHEMA && EXPENSE_BATCH_SCHEMA.buildPhotoFailureFolderReport) {
                        const debugText = EXPENSE_BATCH_SCHEMA.buildPhotoFailureFolderReport(photoFailures, batch.registration);
                        await navigator.clipboard.writeText(debugText);
                        if (window.uiDialogs && window.uiDialogs.showToast) window.uiDialogs.showToast({ title: 'Copied', message: 'Details copied.', tone: 'success' });
                    }
                }
            } catch (error) {
                paidPortalPhotoLogWarn('download-zip:error', { message: error && error.message, batchId: batch && batch.id });
                console.error('Error generating ZIP:', error);
                notifyError('Error generating ZIP: ' + error.message);
            }
        }

        // Helper function to get or create a folder
        async function getOrCreateFolder(parentHandle, folderName) {
            try {
                return await parentHandle.getDirectoryHandle(folderName, { create: true });
            } catch (error) {
                console.error(`Error creating folder ${folderName}:`, error);
                throw error;
            }
        }

        async function viewExpensePhotos(batchId) {
            paidPortalPhotoLog('view:open-click', { batchId: batchId, page: 'driver-paid-expenses.html' });
            let batch = allPaidBatches.find(b => b.id === batchId);
            if (!batch) {
                paidPortalPhotoLogWarn('view:batch-missing', { batchId: batchId });
                return;
            }

            const grid = document.getElementById('photoViewerGrid');
            grid.innerHTML = '<div class="text-center text-gray-400 p-8">Loading photos…</div>';
            document.getElementById('photoViewerModal').classList.remove('hidden');

            try {
                const batchRef = window.doc(window.db, 'expenseBatches', batchId);
                let serverSnap = null;
                if (typeof window.getDocFromServer === 'function') {
                    serverSnap = await window.getDocFromServer(batchRef);
                } else {
                    serverSnap = await window.getDoc(batchRef);
                }
                if (serverSnap && serverSnap.exists()) {
                    batch = { id: serverSnap.id, ...serverSnap.data() };
                    const listIdx = allPaidBatches.findIndex(b => b.id === batchId);
                    if (listIdx >= 0) allPaidBatches[listIdx] = batch;
                    paidPortalPhotoLog('view:refetched-batch-from-firestore', { batchId: batchId, registration: batch.registration });
                } else {
                    paidPortalPhotoLogWarn('view:firestore-miss', { batchId: batchId });
                }
            } catch (refetchErr) {
                paidPortalPhotoLogWarn('view:refetch-failed-using-cache', { batchId: batchId, message: refetchErr && refetchErr.message });
            }

            const linePhotoDebug = [];
            const allPhotos = [];
            if (batch.lines && typeof EXPENSE_BATCH_SCHEMA !== 'undefined' && (EXPENSE_BATCH_SCHEMA.getUsedLinesInOrder || EXPENSE_BATCH_SCHEMA.getUsedLines)) {
                const getLbl = EXPENSE_BATCH_SCHEMA.getCategoryLabel ? EXPENSE_BATCH_SCHEMA.getCategoryLabel.bind(null) : function (k) { return k; };
                (EXPENSE_BATCH_SCHEMA.getUsedLinesInOrder || EXPENSE_BATCH_SCHEMA.getUsedLines)(batch).forEach(k => {
                    const line = batch.lines[k];
                    if (!line || !Array.isArray(line.photos)) return;
                    const httpUrls = line.photos.filter(u => typeof u === 'string' && u.startsWith('http'));
                    if (httpUrls.length === 0) return;
                    linePhotoDebug.push({
                        lineKey: k,
                        lineLabel: getLbl(k),
                        count: httpUrls.length,
                        urls: httpUrls.map(u => summarizePhotoUrlForLogPortal(u))
                    });
                    httpUrls.forEach(u => allPhotos.push(u));
                });
            }

            paidPortalPhotoLog('view:collected-urls', {
                batchId: batchId,
                registration: batch.registration,
                totalImages: allPhotos.length,
                byLine: linePhotoDebug
            });

            if (allPhotos.length === 0) {
                paidPortalPhotoLogWarn('view:no-http-urls', { batchId: batchId, lineSummary: linePhotoDebug });
                grid.innerHTML = '';
                document.getElementById('photoViewerModal').classList.add('hidden');
                notifyInfo('No photos available for this expense batch.', 'No Photos');
                return;
            }

            paidPortalPhotoLog('view:refreshing-tokens-via-getDownloadURL', { count: allPhotos.length });
            const displayUrls = await Promise.all(allPhotos.map(async (storedUrl, i) => {
                const fresh = await refreshPaidExpensePhotoDownloadUrl(storedUrl);
                const chosen = (typeof fresh === 'string' && fresh.length > 0) ? fresh : storedUrl;
                if (chosen !== storedUrl) {
                    paidPortalPhotoLog('view:display-url-refreshed', { index: i + 1, of: allPhotos.length });
                } else if (fresh == null && storedUrl.indexOf('firebasestorage.googleapis.com') >= 0) {
                    paidPortalPhotoLogWarn('view:getDownloadURL-returned-null', { index: i + 1, urlSummary: summarizePhotoUrlForLogPortal(storedUrl) });
                }
                return chosen;
            }));

            grid.innerHTML = '';
            displayUrls.forEach((url, index) => {
                const outer = document.createElement('div');
                outer.className = 'w-full max-w-4xl mx-auto mb-6';
                const card = document.createElement('div');
                card.className = 'bg-[#1a1f24] rounded-xl p-4 shadow-2xl border border-[#283039]';
                const img = document.createElement('img');
                img.alt = 'Expense photo ' + (index + 1);
                img.className = 'w-full h-auto rounded-lg shadow-lg object-contain max-h-[70vh] mx-auto';
                img.loading = 'lazy';
                img.style.display = 'block';
                const cap = document.createElement('div');
                cap.className = 'text-center mt-3 text-sm text-gray-400';
                cap.textContent = 'Photo ' + (index + 1) + ' of ' + displayUrls.length;
                card.appendChild(img);
                card.appendChild(cap);
                outer.appendChild(card);
                grid.appendChild(outer);

                paidPortalPhotoLog('view:img-assign-src', { index: index + 1, of: displayUrls.length, urlSummary: summarizePhotoUrlForLogPortal(url) });
                img.addEventListener('load', function () {
                    paidPortalPhotoLog('view:img-browser-load-ok', {
                        index: index + 1,
                        naturalWidth: img.naturalWidth,
                        naturalHeight: img.naturalHeight
                    });
                });
                img.addEventListener('error', function () {
                    paidPortalPhotoLogWarn('view:img-browser-load-failed', {
                        index: index + 1,
                        of: displayUrls.length,
                        urlSummary: summarizePhotoUrlForLogPortal(url),
                        hint: 'Still failing after getDownloadURL — check Storage rules, object exists, or duplicate/wrong path in Firestore'
                    });
                });
                img.src = url;
            });

            paidPortalPhotoLog('view:modal-rendered', { batchId: batchId, slots: displayUrls.length });
        }

        // Close photo viewer
        function closePhotoViewer() {
            document.getElementById('photoViewerModal').classList.add('hidden');
            document.getElementById('photoViewerGrid').innerHTML = '';
        }

        // Close photo viewer on Escape key
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape' && !document.getElementById('photoViewerModal').classList.contains('hidden')) {
                closePhotoViewer();
            }
        });
    </script>
</body>
